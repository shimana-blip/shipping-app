<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
<title>Wan!scan</title>
<style>
:root{--b:#007AFF;--g:#34C759;--o:#FF9500;--r:#FF3B30;--p:#5856D6;--pk:#FF2D55;--bg:#F2F2F7;--t1:#000;--t3:rgba(60,60,67,.5);--t4:rgba(60,60,67,.25);--sep:rgba(60,60,67,.08);--sb:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:var(--bg);font-family:-apple-system,'SF Pro Display','Hiragino Sans',sans-serif;-webkit-font-smoothing:antialiased;color:var(--t1);padding-bottom:calc(90px + var(--sb))}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.nav{position:sticky;top:0;z-index:200;padding:12px 20px;background:rgba(242,242,247,.82);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-bottom:.33px solid rgba(0,0,0,.08)}
.nav-in{max-width:500px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.nav-t{font-size:17px;font-weight:600;letter-spacing:-.02em}
.nav-btns{display:flex;gap:4px}
.nb{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;background:transparent;transition:.15s}
.nb:active{transform:scale(.88);opacity:.6}
.nb.on{background:rgba(0,122,255,.1)}
.wrap{max-width:500px;margin:0 auto;padding:8px 16px 20px}
.panel{animation:up .35s cubic-bezier(.2,.8,.4,1)}
.sec{margin-bottom:18px}
.sec-h{font-size:13px;font-weight:400;color:var(--t3);text-transform:uppercase;letter-spacing:.02em;padding:0 20px 6px}
.cd{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 0 0 .33px rgba(0,0,0,.04)}
.cr{padding:14px 20px;display:flex;align-items:center;gap:14px;border-bottom:.33px solid var(--sep)}
.cr:last-child{border-bottom:none}
.cr-i{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cr-b{flex:1;min-width:0}
.cr-l{font-size:13px;color:var(--t3);font-weight:500;margin-bottom:2px}
.cr-inp{width:100%;border:none;outline:none;font-size:16px;color:var(--t1);background:transparent;font-family:inherit;padding:0}
.cr-inp::placeholder{color:var(--t4)}
.cr-sel{width:100%;border:none;outline:none;font-size:16px;color:var(--t1);background:transparent;font-family:inherit;padding:0;-webkit-appearance:none;appearance:none}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 16px}
.cb{padding:14px 10px;border-radius:14px;border:2px solid var(--sep);background:#fff;cursor:pointer;text-align:center;transition:.25s;font-family:inherit}
.cb.on{border-color:var(--b);background:rgba(0,122,255,.04)}
.cb:active{transform:scale(.96)}
.cb-e{font-size:26px;margin-bottom:4px}
.cb-n{font-size:13px;font-weight:600}
.cb-s{font-size:10px;color:var(--t3);margin-top:1px}
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:14px 16px}
.chip{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:100px;background:rgba(120,120,128,.06);border:2px solid transparent;font-size:14px;font-weight:500;color:rgba(60,60,67,.85);cursor:pointer;transition:.25s;font-family:inherit}
.chip.on{font-weight:600}
.chip:active{transform:scale(.94)}
.cdot{width:7px;height:7px;border-radius:50%;display:inline-block;transition:.25s}
.sz{padding:16px}
.dz{border-radius:16px;padding:32px 20px;text-align:center;cursor:pointer;border:1.5px dashed rgba(120,120,128,.15);background:rgba(120,120,128,.02);transition:.25s}
.dz:active{transform:scale(.98)}
.dz-i{width:50px;height:50px;border-radius:14px;background:linear-gradient(145deg,#007AFF,#5AC8FA);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;box-shadow:0 6px 18px rgba(0,122,255,.22)}
.td{padding:18px;border-radius:14px;background:linear-gradient(135deg,rgba(0,122,255,.05),rgba(90,200,250,.04));border:.5px solid rgba(0,122,255,.1);text-align:center}
.tn-disp{font-size:24px;font-weight:700;letter-spacing:.06em;color:var(--b)}
.tr-btn{margin-top:8px;background:none;border:none;color:var(--b);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.sg{display:flex;flex-wrap:wrap;gap:5px;padding:4px 20px 10px}
.sc{padding:5px 12px;border-radius:100px;background:rgba(0,122,255,.06);color:var(--b);font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.sc:active{transform:scale(.94);background:rgba(0,122,255,.12)}
.imgp{position:relative;border-radius:14px;overflow:hidden}
.imgp img{width:100%;display:block;max-height:150px;object-fit:cover}
.imgp-o{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.35),transparent 50%)}
.imgp-x{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.45);backdrop-filter:blur(16px);border:none;color:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.bb{position:fixed;bottom:0;left:0;right:0;z-index:150;padding:12px 16px calc(12px + var(--sb));background:rgba(242,242,247,.88);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-top:.33px solid rgba(0,0,0,.08)}
.bb-in{max-width:500px;margin:0 auto}
.bs{width:100%;padding:16px;background:var(--b);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.bs:active{transform:scale(.97);filter:brightness(.9)}
.bs:disabled{background:rgba(120,120,128,.12);color:rgba(60,60,67,.25);cursor:default;box-shadow:none!important}
.bs:not(:disabled){box-shadow:0 4px 16px rgba(0,122,255,.35)}
.bg-btn{padding:14px 20px;background:rgba(120,120,128,.06);color:var(--b);border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.bg-btn:active{transform:scale(.96);background:rgba(120,120,128,.12)}
.rr{display:flex;justify-content:space-between;align-items:center;padding:13px 20px;border-bottom:.33px solid var(--sep)}
.rr:last-child{border:none}
.rl{font-size:14px;color:var(--t3);display:flex;align-items:center;gap:6px}
.rv{font-size:15px;font-weight:500;text-align:right;max-width:58%}
.okc{width:76px;height:76px;border-radius:50%;background:linear-gradient(145deg,#34C759,#30D158);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:34px;color:#fff;box-shadow:0 8px 28px rgba(52,199,89,.3);animation:pop .5s cubic-bezier(.2,.8,.4,1)}
.err{margin:12px 0 0;padding:12px 16px;border-radius:12px;background:rgba(255,59,48,.06);color:var(--r);font-size:14px;font-weight:500;text-align:center}
.ft{margin-top:28px;text-align:center;font-size:11px;color:var(--t4);line-height:1.8}
.hidden{display:none}
.sh{background:#fff;border-radius:16px;overflow:hidden;margin-bottom:16px;animation:up .3s cubic-bezier(.2,.8,.4,1);box-shadow:0 0 0 .33px rgba(0,0,0,.04)}
.sh-h{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 12px}
.sh-t{font-size:20px;font-weight:700;letter-spacing:-.03em}
.sh-b{padding:0 20px 20px}
.hi{padding:12px 0;border-bottom:.33px solid var(--sep)}
.hi:last-child{border:none}
.clb{width:28px;height:28px;border-radius:50%;background:rgba(120,120,128,.1);border:none;cursor:pointer;font-size:12px;color:#8E8E93;display:flex;align-items:center;justify-content:center}
.cfm-btn{background:none;border:none;color:var(--b);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.scan-status{margin-top:10px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500;text-align:center}
</style>
</head>
<body>

<div class="nav"><div class="nav-in"><span class="nav-t">Wan!scan</span><div class="nav-btns"><button class="nb" id="histBtn" onclick="toggleHist()">📋</button></div></div></div>
<div class="wrap" id="wrap"></div>
<div class="bb" id="bottomBar" style="display:none"><div class="bb-in"><button class="bs" id="sendBtn" disabled onclick="doSend()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>Teamsに送信</button></div></div>
<input type="file" accept="image/*" id="fileIn" class="hidden" onchange="onFile(this)">
<input type="file" accept="image/*" capture="environment" id="camIn" class="hidden" onchange="onFile(this)">

<script>
var HL = [
  {n:"田口",r:"機材",c:"#007AFF"},
  {n:"御手洗",r:"機材",c:"#5856D6"},
  {n:"嶋名",r:"備品",c:"#34C759"},
  {n:"上原",r:"備品",c:"#FF9500"},
  {n:"今若",r:"備品",c:"#FF2D55"}
];
var CL = [
  {n:"ヤマト運輸",s:"ヤマト",i:"🐱"},
  {n:"佐川急便",s:"佐川",i:"🚛"},
  {n:"日本郵便",s:"郵便",i:"📮"},
  {n:"西濃運輸",s:"西濃",i:"🚚"}
];
var FL = [
  {k:"tracking_number",l:"送り状番号",i:"🔢"},
  {k:"date",l:"発送日",i:"📅"},
  {k:"arrival_date",l:"届け予定日",i:"🕐"},
  {k:"carrier",l:"配送業者",i:"🚛"},
  {k:"item_name",l:"品名",i:"🏷"},
  {k:"quantity",l:"個口数",i:"📦"},
  {k:"destination",l:"配送先",i:"📍"},
  {k:"sender",l:"送り元",i:"🏢"}
];

var S = {
  step:0, img:null, mt:"image/jpeg",
  tn:"", sd:tod(), ad:addD(tod(),2),
  cr:"", it:"", qt:"1", ds:"", sn:"", hd:"",
  mi:false, scanning:false,
  showHist:false, recs:[]
};

function tod(){return new Date().toISOString().split("T")[0]}
function addD(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().split("T")[0]}
function fm(d){return d?d.replace(/-/g,"/"):""}
function lH(){try{return JSON.parse(localStorage.getItem("ws1")||"{}")}catch(e){return{}}}
function sH(h){try{localStorage.setItem("ws1",JSON.stringify(h))}catch(e){}}
function aH(k,v){if(!v||v.length<2)return;var h=lH();if(!h[k])h[k]=[];var a=[v];for(var i=0;i<h[k].length;i++){if(h[k][i]!==v)a.push(h[k][i])}h[k]=a.slice(0,8);sH(h)}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function hexRgb(hex){return parseInt(hex.slice(1,3),16)+","+parseInt(hex.slice(3,5),16)+","+parseInt(hex.slice(5,7),16)}
function updSend(){var btn=document.getElementById("sendBtn");if(btn)btn.disabled=!(S.tn&&S.cr&&S.hd&&S.ds)}

function clearTn(){S.tn="";S.img=null;S.mi=false;render()}
function pickCarrier(n){S.cr=n;render()}
function pickHandler(n){S.hd=n;render()}
function startManual(){S.mi=true;render()}
function confirmTn(){if(S.tn){S.mi=false;render()}}
function clearImg(){S.img=null;render()}
function pickSuggest(key,val){S[key]=val;render()}
function setDate(field,val){S[field]=val;if(field==="sd")S.ad=addD(val,2);render()}
function toggleHist(){S.showHist=!S.showHist;render()}

function onFile(inp){
  var f=inp.files[0];if(!f)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      // Resize to max 1200px wide to keep under Vercel 4.5MB limit
      var maxW=1200,maxH=1200;
      var w=img.width,h=img.height;
      if(w>maxW||h>maxH){
        var ratio=Math.min(maxW/w,maxH/h);
        w=Math.round(w*ratio);h=Math.round(h*ratio);
      }
      var canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      var ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,w,h);
      var dataUrl=canvas.toDataURL("image/jpeg",0.8);
      S.img=dataUrl.split(",")[1];
      S.mt="image/jpeg";
      render();
    };
    img.onerror=function(){
      // Fallback: use raw file if Image fails
      S.img=e.target.result.split(",")[1];
      S.mt=f.type||"image/jpeg";
      render();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(f);inp.value="";
}

var AKEY="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";
var WURL="https://defaultfb75f95ffd7a4157a09dc32a438748.64.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/2997d8e04f6d431798a5b3a8e4c4edc6/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=PwSLoyUAVJsoaqe8MluBYbG1cqM_szEtY0H3i9UduOM";

function doScan(){
  if(!S.img){showErr("画像を選択してください");return}
  S.scanning=true;render();
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":AKEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:S.mt,data:S.img}},
      {type:"text",text:"この画像は日本の宅配便の送り状（配送伝票）です。以下の情報を読み取ってJSON形式で返してください。\n\n読み取る項目:\n1. tracking_number: 送り状番号（お問い合わせ番号/伝票番号）\n   - バーコード付近に印字された数字列\n   - ヤマト運輸: 12桁（4桁-4桁-4桁）\n   - 佐川急便: 12桁\n   - 日本郵便: 11-13桁\n   - 西濃運輸: 10-12桁\n   - 最も大きく目立つ数字列がそれ\n2. carrier: 配送業者名（ヤマト運輸/佐川急便/日本郵便/西濃運輸のいずれか。ロゴ・色・書式から判断）\n   - 黄緑/黒のクロネコマーク → ヤマト運輸\n   - 青い伝票/飛脚マーク → 佐川急便\n   - 赤/オレンジ/〒マーク → 日本郵便\n   - 緑の伝票/カンガルーマーク → 西濃運輸\n\n必ずこの形式で返してください（他の文字不要）:\n{\"tracking_number\":\"読み取った番号\",\"carrier\":\"業者名\"}\n\n読み取れない項目はnullにしてください。"}
    ]}]})
  })
  .then(function(r){if(!r.ok)throw new Error("API Error "+r.status);return r.json()})
  .then(function(data){
    S.scanning=false;
    var text=(data.content&&data.content[0]&&data.content[0].text||"").trim();
    var result={tracking_number:null,carrier:null};
    try{var jm=text.match(/\{[\s\S]*\}/);if(jm)result=JSON.parse(jm[0])}catch(e){var nm=text.match(/[\d][\d\-]{8,}/);if(nm)result.tracking_number=nm[0]}
    if(result.tracking_number){
      S.tn=result.tracking_number;
      if(result.carrier){for(var i=0;i<CL.length;i++){if(CL[i].n===result.carrier)S.cr=result.carrier}}
      render();
    }else{showErr("番号を読み取れませんでした。手入力してください。");render()}
  })
  .catch(function(e){S.scanning=false;showErr("読み取りエラー: "+e.message);render()});
}

function doSend(){
  S.step=3;render();
  var rec={
    tracking_number:S.tn,date:fm(S.sd),arrival_date:fm(S.ad),
    carrier:S.cr,item_name:S.it,quantity:S.qt+"個口",
    destination:S.ds,sender:S.sn,handler:S.hd
  };
  aH("item_name",S.it);aH("destination",S.ds);aH("sender",S.sn);
  if(!WURL){S.recs.unshift(rec);S.step=4;render();return}
  var facts=[];
  for(var i=0;i<FL.length;i++){facts.push({title:FL[i].i+" "+FL[i].l,value:rec[FL[i].k]||"-"})}
  facts.push({title:"👤 担当者",value:rec.handler||"-"});
  var card={type:"message",attachments:[{contentType:"application/vnd.microsoft.card.adaptive",content:{
    type:"AdaptiveCard","$schema":"http://adaptivecards.io/schemas/adaptive-card.json",version:"1.4",
    body:[{type:"Container",style:"emphasis",items:[{type:"TextBlock",text:"📦 配送記録が登録されました",weight:"Bolder",size:"Medium"}]},{type:"FactSet",facts:facts},{type:"TextBlock",text:"登録: "+new Date().toLocaleString("ja-JP",{timeZone:"Asia/Tokyo"}),size:"Small",isSubtle:true,spacing:"Medium"}]
  }}]};
  fetch(WURL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(card)})
  .then(function(r){if(!r.ok)throw new Error("Teams送信失敗("+r.status+")");S.recs.unshift(rec);S.step=4;render()})
  .catch(function(e){showErr(e.message);S.step=0;render()});
}

function doReset(){
  S.step=0;S.img=null;S.tn="";S.mi=false;
  S.sd=tod();S.ad=addD(tod(),2);
  S.cr="";S.it="";S.qt="1";S.ds="";S.sn="";
  render();
}

function showErr(msg){setTimeout(function(){var b=document.getElementById("errBox");if(b)b.innerHTML='<div class="err">'+esc(msg)+'</div>'},50)}

function buildSuggestRow(stKey,hKey,label,ph,icon,bg){
  var val=S[stKey];var hs=lH()[hKey]||[];var show=hs.length>0&&!val;
  var h='<div class="cr"><div class="cr-i" style="background:'+bg+'">'+icon+'</div>';
  h+='<div class="cr-b"><div class="cr-l">'+label+'</div>';
  h+='<input class="cr-inp" value="'+esc(val)+'" oninput="S.'+stKey+'=this.value;updSend()" placeholder="'+ph+'"></div></div>';
  if(show){h+='<div class="sg">';for(var i=0;i<hs.length;i++){h+='<button class="sc" onclick="pickSuggest(\''+stKey+'\',\''+esc(hs[i]).replace(/'/g,"")+ '\')">'+esc(hs[i])+'</button>'}h+='</div>'}
  return h;
}

function render(){
  var w=document.getElementById("wrap");
  var bb=document.getElementById("bottomBar");
  var html="";

  if(S.showHist){
    html+='<div class="sh" style="max-height:420px;overflow-y:auto"><div class="sh-h"><span class="sh-t">送信履歴</span><button class="clb" onclick="toggleHist()">✕</button></div><div class="sh-b">';
    if(S.recs.length===0){html+='<div style="text-align:center;padding:28px 0;color:var(--t4)"><div style="font-size:40px;opacity:.4">📭</div><p style="font-size:14px;margin-top:6px">まだ記録がありません</p></div>'
    }else{for(var i=0;i<S.recs.length;i++){var r=S.recs[i];html+='<div class="hi"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:14px;font-weight:600">'+esc(r.carrier)+'</span><span style="font-size:12px;font-weight:600;color:var(--b)">#'+esc(r.tracking_number)+'</span></div><div style="font-size:13px;color:var(--t3);margin-top:3px">'+esc(r.item_name)+' → '+esc(r.destination)+'</div><div style="font-size:11px;color:var(--t4);margin-top:3px">'+esc(r.handler)+' · '+esc(r.date)+'</div></div>'}}
    html+='</div></div>';
  }

  if(S.step===0){
    bb.style.display="block";
    html+='<div class="panel">';
    // Tracking
    html+='<div class="sec"><div class="sec-h">送り状番号</div><div class="cd">';
    if(!S.img&&!S.tn&&!S.mi){
      html+='<div class="sz"><div class="dz" onclick="document.getElementById(\'fileIn\').click()"><div class="dz-i"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg></div><p style="font-size:15px;font-weight:600">撮影して読み取る</p><p style="margin-top:4px;font-size:12px;color:var(--t4)">タップで撮影 / ドロップも可</p></div>';
      html+='<div style="display:flex;gap:8px;margin-top:10px"><button class="bg-btn" style="flex:1;font-size:14px" onclick="document.getElementById(\'camIn\').click()">📷 カメラ</button><button class="bg-btn" style="flex:1;font-size:14px" onclick="document.getElementById(\'fileIn\').click()">🖼 ライブラリ</button></div></div>';
      html+='<div class="cr" style="border-top:.33px solid var(--sep);cursor:pointer" onclick="startManual()"><div class="cr-i" style="background:rgba(0,122,255,.08)">🔢</div><div class="cr-b"><div class="cr-l">手入力</div><div style="font-size:16px;color:var(--t4)">タップして番号を入力</div></div><div style="color:var(--t4);font-size:14px">→</div></div>';
    }else if(S.img&&!S.tn&&!S.mi){
      html+='<div class="sz"><div class="imgp" style="margin-bottom:10px"><img src="data:'+S.mt+';base64,'+S.img+'"><div class="imgp-o"></div><button class="imgp-x" onclick="clearImg()">✕</button></div>';
      if(S.scanning){html+='<button class="bs" disabled style="background:rgba(120,120,128,.12);color:var(--t4);box-shadow:none">読み取り中...</button>'}
      else{html+='<button class="bs" onclick="doScan()" style="box-shadow:0 4px 16px rgba(0,122,255,.35)">番号を読み取る</button>'}
      html+='</div>';
    }
    if(S.tn&&!S.mi){html+='<div class="sz"><div class="td"><div class="tn-disp">'+esc(S.tn)+'</div><button class="tr-btn" onclick="clearTn()">読み直す</button></div></div>'}
    if(S.mi){html+='<div class="cr"><div class="cr-i" style="background:rgba(0,122,255,.08)">🔢</div><div class="cr-b"><div class="cr-l">手入力</div><input class="cr-inp" id="tnInput" value="'+esc(S.tn)+'" oninput="S.tn=this.value;updSend()" placeholder="4980-6897-5493" style="font-variant-numeric:tabular-nums;letter-spacing:.03em"></div><button class="cfm-btn" onclick="confirmTn()">確定</button></div>'}
    html+='</div></div>';

    // Dates
    html+='<div class="sec"><div class="sec-h">配送日程</div><div class="cd">';
    html+='<div class="cr"><div class="cr-i" style="background:rgba(0,122,255,.08)">📅</div><div class="cr-b"><div class="cr-l">発送日</div><input class="cr-inp" type="date" value="'+S.sd+'" onchange="setDate(\'sd\',this.value)"></div></div>';
    html+='<div class="cr"><div class="cr-i" style="background:rgba(90,200,250,.1)">🕐</div><div class="cr-b"><div class="cr-l">届け予定日</div><input class="cr-inp" type="date" value="'+S.ad+'" onchange="setDate(\'ad\',this.value)"></div></div>';
    html+='</div></div>';

    // Carrier
    html+='<div class="sec"><div class="sec-h">配送業者</div><div class="cd"><div class="cg">';
    for(var i=0;i<CL.length;i++){var c=CL[i];html+='<div class="cb'+(S.cr===c.n?" on":"")+'" onclick="pickCarrier(\''+c.n+'\')"><div class="cb-e">'+c.i+'</div><div class="cb-n">'+c.s+'</div><div class="cb-s">'+c.n+'</div></div>'}
    html+='</div></div></div>';

    // Info
    html+='<div class="sec"><div class="sec-h">配送情報</div><div class="cd">';
    html+=buildSuggestRow("it","item_name","品名","機材、備品…","🏷","rgba(255,149,0,.08)");
    html+='<div class="cr"><div class="cr-i" style="background:rgba(52,199,89,.08)">📦</div><div class="cr-b"><div class="cr-l">個口数</div><select class="cr-sel" onchange="S.qt=this.value">';
    for(var i=1;i<=30;i++){html+='<option value="'+i+'"'+(S.qt==String(i)?" selected":"")+'>'+i+'個口</option>'}
    html+='</select></div><div style="color:var(--t4);font-size:14px">▼</div></div>';
    html+=buildSuggestRow("ds","destination","配送先","オレンダ青山…","📍","rgba(255,59,48,.06)");
    html+=buildSuggestRow("sn","sender","送り元","福岡大名カンファレンス…","🏢","rgba(88,86,214,.08)");
    html+='</div></div>';

    // Handler
    html+='<div class="sec"><div class="sec-h">担当者</div><div class="cd"><div class="chips">';
    for(var i=0;i<HL.length;i++){var h=HL[i];var on=S.hd===h.n;var sty=on?"border-color:"+h.c+";background:rgba("+hexRgb(h.c)+",.08);color:"+h.c:"";
      html+='<button class="chip'+(on?" on":"")+'" style="'+sty+'" onclick="pickHandler(\''+h.n+'\')"><span class="cdot" style="background:'+(on?h.c:"rgba(120,120,128,.15)")+'"></span><span>'+h.n+'</span><span style="font-size:11px;opacity:.5">'+h.r+'</span></button>'}
    html+='</div></div></div>';
    html+='<div id="errBox"></div></div>';
  }

  if(S.step===3){bb.style.display="none";html+='<div class="cd panel" style="padding:60px 24px;text-align:center"><div style="font-size:32px;animation:pop .5s">⏳</div><p style="font-size:15px;color:var(--t3);font-weight:500;margin-top:16px">Teamsに送信中...</p></div>'}

  if(S.step===4){
    bb.style.display="none";var rec=S.recs[0];
    html+='<div class="panel"><div class="cd" style="padding:40px 0 0;text-align:center;margin-bottom:20px"><div class="okc">✓</div><h3 style="font-size:22px;font-weight:700;letter-spacing:-.03em">送信完了</h3><p style="font-size:14px;color:var(--t3);margin-top:4px;font-weight:500;padding-bottom:16px">camp-機材/備品管理に投稿されました</p>';
    if(rec){html+='<div style="border-top:.33px solid var(--sep)">';for(var i=0;i<FL.length;i++){html+='<div class="rr"><span class="rl">'+FL[i].i+' '+FL[i].l+'</span><span class="rv">'+esc(rec[FL[i].k]||"")+'</span></div>'}
      html+='<div class="rr" style="background:rgba(0,122,255,.02)"><span class="rl">👤 担当者</span><span class="rv" style="font-weight:600;color:var(--b)">'+esc(rec.handler)+'</span></div></div>'}
    html+='</div><button class="bs" onclick="doReset()" style="box-shadow:0 4px 16px rgba(0,122,255,.35)">次の送り状をスキャン</button></div>';
  }

  html+='<div class="ft"><div>機材担当 田口（御手洗）· 備品担当 嶋名（上原 / 今若）</div><div style="margin-top:2px">A.I.KEN Camp</div></div>';
  w.innerHTML=html;updSend();
  if(S.mi){var inp=document.getElementById("tnInput");if(inp)inp.focus()}
  document.getElementById("histBtn").className="nb"+(S.showHist?" on":"");
}

render();
</script>
</body>
</html>
